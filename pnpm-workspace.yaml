packages:
  - apps/*
  - packages/*

catalog:
  "@tailwindcss/vite": ^4.1.13
  "@testing-library/react": ^16.3.0
  "@testing-library/user-event": ^14.6.1
  "@types/react": ^19.1.10
  "@types/react-dom": ^19.1.7
  "@types/semver": ^7.7.1
  lucide-react: ^1.0.0
  playwright: ^1.58.2
  react: ^19.1.1
  react-dom: ^19.1.1
  react-router-dom: ^7.8.2
  recharts: ^3.0.0
  semver: ^7.7.2
  tailwindcss: ^4.1.13
  top-github-dependents-by-stars: ^1.0.4
  typescript: ^7.0.0
  vite-plus: 0.2.6
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5

allowBuilds:
  "@parcel/watcher": true
  "@tailwindcss/oxide": true
  esbuild: true

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@tailwindcss/oxide"
  - esbuild
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
